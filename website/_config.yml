title: WhichCar 🚗
email: contato@whichcar.com.br
description: >-
  O matcher de carros personalizado para o mercado brasileiro. Compare dimensões, porta-malas, motorização, segurança, peso e custos baseado nas suas necessidades.
baseurl: "/whichcar.com"
url: ""

# Build settings
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "whichbike"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Defaults for pages and posts
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: false
      classes: wide
